name = "echo-finance-ai"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
WORKER_VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "echo-finance-ai"
database_id = "7b3f66aa-a37a-4a5f-bd8a-0ffc2ea8abe9"

[[kv_namespaces]]
binding = "CACHE"
id = "c4ebdd2867ad463c90233071166dc8ee"

[[services]]
binding = "ENGINE_RUNTIME"
service = "echo-engine-runtime"

[[services]]
binding = "SHARED_BRAIN"
service = "echo-shared-brain"

[triggers]
crons = ["*/15 * * * *", "0 7 * * *"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
